<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backlog - Drone Commander</title>
    <meta name="description" content="Live development backlog for Drone Commander — what's in flight, what's queued, what's done.">
    <meta property="og:title" content="Backlog - Drone Commander">
    <meta property="og:description" content="Live development backlog for Drone Commander — RPG, VN, RTS and meta tasks.">
    <meta property="og:image" content="https://dronecommander.gg/assets/img/cover.png">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Backlog - Drone Commander">
    <meta name="twitter:description" content="Live development backlog for Drone Commander.">
    <meta name="twitter:image" content="https://dronecommander.gg/assets/img/cover.png">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛸</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            margin: 0;
        }

        .top-bar {
            background: rgba(0, 0, 0, 0.9);
            border-bottom: 2px solid #00ffcc;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 50;
            flex-wrap: wrap;
            gap: 8px;
        }
        .top-bar .brand {
            color: #00ffcc;
            font-size: 1.2rem;
            font-weight: bold;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .top-bar .brand:hover { text-shadow: 0 0 10px #00ffcc; }
        .top-bar .nav-link {
            color: #00ffcc;
            text-decoration: none;
            font-size: 0.85rem;
            text-transform: uppercase;
            padding: 6px 14px;
            border: 1px solid transparent;
            transition: 0.3s;
        }
        .top-bar .nav-link:hover {
            border-color: #00ffcc;
            box-shadow: 0 0 8px rgba(0, 255, 204, 0.3);
        }

        .hero-banner {
            background: linear-gradient(180deg, rgba(0,255,204,0.08) 0%, rgba(18,18,18,1) 100%);
            text-align: center;
            padding: 40px 20px 24px;
            border-bottom: 1px solid rgba(0,255,204,0.2);
        }
        .hero-banner h1 {
            color: #00ffcc;
            font-size: 2.4rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(0,255,204,0.5);
            margin-bottom: 8px;
        }
        .hero-banner .tagline {
            color: #aaa;
            font-size: 0.95rem;
        }

        .container-wrap {
            max-width: 1500px;
            margin: 0 auto;
            padding: 24px 20px 60px;
        }

        /* Stats */
        .stat-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            flex: 1 1 140px;
            background: rgba(0,255,204,0.04);
            border: 1px solid rgba(0,255,204,0.2);
            border-radius: 6px;
            padding: 12px 16px;
            min-width: 140px;
        }
        .stat-card .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #00ffcc;
            opacity: 0.85;
            margin-bottom: 4px;
        }
        .stat-card .stat-value {
            font-size: 1.6rem;
            color: #e0e0e0;
            font-weight: bold;
        }
        .stat-card .stat-sub {
            font-size: 0.75rem;
            color: #888;
            margin-top: 2px;
        }
        .progress-bar-wrap {
            margin-top: 18px;
            height: 10px;
            background: rgba(255,255,255,0.06);
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid rgba(0,255,204,0.15);
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ffcc 0%, #00cca3 100%);
            box-shadow: 0 0 8px rgba(0,255,204,0.5);
            transition: width 0.4s;
        }
        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #888;
            margin-top: 6px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* Filters */
        .filter-bar {
            background: rgba(0,255,204,0.03);
            border: 1px solid rgba(0,255,204,0.15);
            border-radius: 6px;
            padding: 14px 16px;
            margin: 18px 0 24px;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .filter-label {
            color: #00ffcc;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-right: 4px;
        }
        .chip {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.03);
            color: #ccc;
            user-select: none;
            transition: 0.2s;
        }
        .chip:hover { border-color: rgba(0,255,204,0.5); color: #fff; }
        .chip.active {
            background: rgba(0,255,204,0.15);
            border-color: #00ffcc;
            color: #00ffcc;
            box-shadow: 0 0 8px rgba(0,255,204,0.3);
        }
        .search-input {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(0,255,204,0.3);
            color: #e0e0e0;
            padding: 6px 12px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            min-width: 200px;
        }
        .search-input:focus {
            outline: none;
            border-color: #00ffcc;
            box-shadow: 0 0 8px rgba(0,255,204,0.3);
        }

        /* Board */
        .board {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
        }
        .column {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            min-height: 100px;
        }
        .column-header {
            padding: 12px 14px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .column-title {
            color: #00ffcc;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.85rem;
            font-weight: bold;
        }
        .column-count {
            color: #888;
            font-size: 0.75rem;
            background: rgba(255,255,255,0.05);
            padding: 2px 8px;
            border-radius: 10px;
        }
        .column.col-inflight .column-title { color: #ffcc00; }
        .column.col-inflight { border-color: rgba(255,204,0,0.2); }
        .column.col-done .column-title { color: #66ff99; }
        .column.col-done { border-color: rgba(102,255,153,0.2); }
        .column.col-drunmuire .column-title { color: #c084ff; }
        .column.col-drunmuire { border-color: rgba(192,132,255,0.2); }
        .column.col-forge .column-title { color: #ff9966; }
        .column.col-forge { border-color: rgba(255,153,102,0.2); }
        .column.col-plot .column-title { color: #ff66cc; }
        .column.col-plot { border-color: rgba(255,102,204,0.2); }

        .column-body {
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
            max-height: 75vh;
        }
        .column-body::-webkit-scrollbar { width: 6px; }
        .column-body::-webkit-scrollbar-thumb { background: rgba(0,255,204,0.2); border-radius: 3px; }

        /* Card */
        .card-item {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(0,255,204,0.12);
            border-radius: 6px;
            padding: 10px 12px;
            transition: 0.2s;
            position: relative;
        }
        .card-item:hover {
            border-color: rgba(0,255,204,0.5);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0,255,204,0.1);
        }
        .card-item.done {
            opacity: 0.55;
            text-decoration: line-through;
            text-decoration-color: rgba(102,255,153,0.6);
        }
        .card-title {
            color: #e0e0e0;
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 6px;
            line-height: 1.3;
        }
        .card-desc {
            color: #888;
            font-size: 0.78rem;
            margin-bottom: 8px;
            line-height: 1.4;
        }
        .card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
        }
        .kind-chip {
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }
        .kind-RPG { background: rgba(0,255,204,0.15); color: #00ffcc; border: 1px solid rgba(0,255,204,0.4); }
        .kind-VN { background: rgba(255,102,204,0.15); color: #ff66cc; border: 1px solid rgba(255,102,204,0.4); }
        .kind-RTS { background: rgba(255,153,102,0.15); color: #ff9966; border: 1px solid rgba(255,153,102,0.4); }
        .kind-Other { background: rgba(180,180,180,0.12); color: #b0b0b0; border: 1px solid rgba(180,180,180,0.3); }

        .priority-dot {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.65rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .priority-dot::before {
            content: '';
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
        }
        .priority-high::before { background: #ff5577; box-shadow: 0 0 6px rgba(255,85,119,0.7); }
        .priority-medium::before { background: #ffcc00; box-shadow: 0 0 6px rgba(255,204,0,0.6); }
        .priority-low::before { background: #777; }

        .size-chip {
            font-size: 0.62rem;
            padding: 2px 6px;
            border-radius: 3px;
            background: rgba(255,255,255,0.05);
            color: #aaa;
            border: 1px solid rgba(255,255,255,0.1);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .id-tag {
            font-size: 0.62rem;
            color: #555;
            margin-left: auto;
        }

        .empty-state {
            color: #555;
            text-align: center;
            padding: 30px 10px;
            font-size: 0.85rem;
            font-style: italic;
        }

        .loading {
            text-align: center;
            color: #00ffcc;
            padding: 40px;
            font-size: 1rem;
            letter-spacing: 2px;
        }

        .legend {
            margin-top: 18px;
            font-size: 0.7rem;
            color: #777;
            text-align: center;
            letter-spacing: 1px;
        }
        .legend span { margin: 0 8px; }

        @media (max-width: 600px) {
            .hero-banner h1 { font-size: 1.6rem; letter-spacing: 2px; }
            .filter-bar { flex-direction: column; align-items: flex-start; }
            .search-input { width: 100%; min-width: 0; }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="/" class="brand">// Drone Commander</a>
        <div>
            <a href="/devlog" class="nav-link">DevLog</a>
            <a href="/latest-update" class="nav-link">Updates</a>
            <a href="/compendium" class="nav-link">Compendium</a>
            <a href="/" class="nav-link">Hub</a>
        </div>
    </div>

    <div class="hero-banner">
        <h1>// Backlog</h1>
        <p class="tagline">Live development board &mdash; what's in flight, what's queued, what's shipped.</p>
    </div>

    <div class="container-wrap">

        <!-- Stats -->
        <div class="stat-row" id="statRow"></div>
        <div>
            <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
            <div class="progress-label">
                <span id="progressText">&mdash;</span>
                <span id="progressPct">0%</span>
            </div>
        </div>

        <!-- Filters -->
        <div class="filter-bar">
            <div class="filter-group">
                <span class="filter-label">Kind</span>
                <span class="chip active" data-filter="kind" data-value="all">All</span>
                <span class="chip" data-filter="kind" data-value="RPG">RPG</span>
                <span class="chip" data-filter="kind" data-value="VN">VN</span>
                <span class="chip" data-filter="kind" data-value="RTS">RTS</span>
                <span class="chip" data-filter="kind" data-value="Other">Other</span>
            </div>
            <div class="filter-group">
                <span class="filter-label">Priority</span>
                <span class="chip active" data-filter="priority" data-value="all">All</span>
                <span class="chip" data-filter="priority" data-value="high">High</span>
                <span class="chip" data-filter="priority" data-value="medium">Medium</span>
                <span class="chip" data-filter="priority" data-value="low">Low</span>
            </div>
            <div class="filter-group">
                <span class="filter-label">Size</span>
                <span class="chip active" data-filter="size" data-value="all">All</span>
                <span class="chip" data-filter="size" data-value="small">S</span>
                <span class="chip" data-filter="size" data-value="medium">M</span>
                <span class="chip" data-filter="size" data-value="big">L</span>
            </div>
            <div class="filter-group" style="flex:1; justify-content:flex-end;">
                <input type="search" id="searchInput" class="search-input" placeholder="Search title or description...">
            </div>
        </div>

        <!-- Board -->
        <div id="boardContainer" class="loading">Loading backlog&hellip;</div>

        <div class="legend">
            <span>&bull; high</span>
            <span>&bull; medium</span>
            <span>&bull; low</span>
            <span>&mdash; size: S / M / L</span>
        </div>
    </div>

    <script>
        const COLUMNS = [
            { key: 'inflight', title: 'In Flight', match: (i) => !i.done && i.label === 'inflight' },
            { key: 'drunmuire', title: 'Drunmuire', match: (i) => !i.done && i.label === 'drunmuire' },
            { key: 'forge', title: 'Forge', match: (i) => !i.done && i.label === 'forge' },
            { key: 'plot', title: 'Plot', match: (i) => !i.done && i.label === 'plot' },
            { key: 'backlog', title: 'Backlog', match: (i) => !i.done && (i.label === 'backlog' || !['inflight','drunmuire','forge','plot'].includes(i.label)) },
            { key: 'done', title: 'Done', match: (i) => i.done === true }
        ];

        let DATA = { items: [] };
        const filters = { kind: 'all', priority: 'all', size: 'all', search: '' };

        async function load() {
            try {
                const res = await fetch('/assets/data/backlog.json', { cache: 'no-store' });
                DATA = await res.json();
                render();
            } catch (e) {
                document.getElementById('boardContainer').innerHTML = '<div class="empty-state">Failed to load backlog.</div>';
            }
        }

        function matchesFilters(item) {
            if (filters.kind !== 'all' && item.kind !== filters.kind) return false;
            if (filters.priority !== 'all' && item.priority !== filters.priority) return false;
            if (filters.size !== 'all' && item.size !== filters.size) return false;
            if (filters.search) {
                const q = filters.search.toLowerCase();
                const hay = (item.title + ' ' + (item.description || '')).toLowerCase();
                if (!hay.includes(q)) return false;
            }
            return true;
        }

        function escapeHtml(s) {
            return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        }

        function renderCard(item) {
            const sizeLabel = { small: 'S', medium: 'M', big: 'L' }[item.size] || '?';
            const doneClass = item.done ? ' done' : '';
            const desc = item.description ? `<div class="card-desc">${escapeHtml(item.description)}</div>` : '';
            return `
                <div class="card-item${doneClass}" data-id="${item.id}">
                    <div class="card-title">${escapeHtml(item.title)}</div>
                    ${desc}
                    <div class="card-meta">
                        <span class="kind-chip kind-${item.kind}">${item.kind}</span>
                        <span class="priority-dot priority-${item.priority}">${item.priority}</span>
                        <span class="size-chip">${sizeLabel}</span>
                        <span class="id-tag">#${item.id}</span>
                    </div>
                </div>
            `;
        }

        function renderStats(items) {
            const total = items.length;
            const done = items.filter(i => i.done).length;
            const inflight = items.filter(i => !i.done && i.label === 'inflight').length;
            const backlogCount = items.filter(i => !i.done && i.label !== 'inflight').length;
            const byKind = items.reduce((acc, i) => { acc[i.kind] = (acc[i.kind] || 0) + 1; return acc; }, {});

            const stats = [
                { label: 'Total', value: total, sub: '' },
                { label: 'Done', value: done, sub: total ? `${Math.round(done/total*100)}% shipped` : '' },
                { label: 'In Flight', value: inflight, sub: 'active' },
                { label: 'Queued', value: backlogCount, sub: 'not yet started' },
                { label: 'RPG', value: byKind.RPG || 0, sub: '' },
                { label: 'VN', value: byKind.VN || 0, sub: '' },
                { label: 'RTS', value: byKind.RTS || 0, sub: '' },
                { label: 'Other', value: byKind.Other || 0, sub: '' }
            ];

            document.getElementById('statRow').innerHTML = stats.map(s => `
                <div class="stat-card">
                    <div class="stat-label">${s.label}</div>
                    <div class="stat-value">${s.value}</div>
                    ${s.sub ? `<div class="stat-sub">${s.sub}</div>` : ''}
                </div>
            `).join('');

            const pct = total ? Math.round(done/total*100) : 0;
            document.getElementById('progressFill').style.width = pct + '%';
            document.getElementById('progressText').textContent = `${done} of ${total} shipped`;
            document.getElementById('progressPct').textContent = pct + '%';
        }

        function render() {
            const items = (DATA.items || []).slice().sort((a, b) => (a.order || 0) - (b.order || 0));
            renderStats(items);

            const visible = items.filter(matchesFilters);

            const cols = COLUMNS.map(col => {
                const colItems = visible.filter(col.match);
                colItems.sort((a, b) => {
                    const pri = { high: 0, medium: 1, low: 2 };
                    return (pri[a.priority] ?? 3) - (pri[b.priority] ?? 3);
                });
                const body = colItems.length
                    ? colItems.map(renderCard).join('')
                    : '<div class="empty-state">&mdash; empty &mdash;</div>';
                return `
                    <div class="column col-${col.key}">
                        <div class="column-header">
                            <span class="column-title">${col.title}</span>
                            <span class="column-count">${colItems.length}</span>
                        </div>
                        <div class="column-body">${body}</div>
                    </div>
                `;
            }).join('');

            const container = document.getElementById('boardContainer');
            container.classList.remove('loading');
            container.className = 'board';
            container.innerHTML = cols;
        }

        document.addEventListener('click', (e) => {
            const chip = e.target.closest('.chip');
            if (!chip) return;
            const filter = chip.dataset.filter;
            const value = chip.dataset.value;
            document.querySelectorAll(`.chip[data-filter="${filter}"]`).forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            filters[filter] = value;
            render();
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            filters.search = e.target.value.trim();
            render();
        });

        load();
    </script>
</body>
</html>
